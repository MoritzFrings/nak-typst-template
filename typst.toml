# for a description of available keys, see https://github.com/typst/packages/?tab=readme-ov-file#package-format

[package]
name = "nordakademie-templates"
version = "0.1.0"
entrypoint = "src/lib.typ"
authors = ["Leon Heuer"]
license = "MIT"
description = "Provides approved styling for transferpapers submitted @Nordakademie"
homepage = ""
repository = ""
keywords = ["Nordakademie", "NAK", "transfer paper", "transferleistung", "Elmshorn"]
categories = []
disciplines = []
# compiler = ""
exclude = [
  ".github",
  "docs",
  "scripts",
  "tests",
  ".typstignore",
  "Justfile",
  "thumbnail-dark.svg",
  "thumbnail-light.svg",
]

[template]
path = "template"
entrypoint = "main.typ"
thumbnail = "thumbnail.png"